<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Places</title>
</head>
<body>
    <h1>Seeded Places</h1>

    <table border="1" cellpadding="8">
        <tr>
            <th>PlaceID</th>
            <th>Name</th>
            <th>AvgRating</th>
            <th>IsActive</th>
        </tr>

        {% for place in places %}
        <tr>
            <td>{{ place.PlaceID }}</td>
            <td>{{ place.Name }}</td>
            <td>{{ place.AvgRating }}</td>
            <td>{{ place.IsActive }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
