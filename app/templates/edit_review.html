<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Review</title>
</head>
<body>
    <h1>Edit Review</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="POST" action="/reviews/{{ review.ReviewID }}/edit">
        <label for="rating">Rating (1-5):</label><br>
        <input type="number" id="rating" name="rating" min="1" max="5" value="{{ review.Rating }}" required><br><br>

        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" value="{{ review.Title or '' }}"><br><br>

        <label for="body">Review:</label><br>
        <textarea id="body" name="body" rows="4" cols="50">{{ review.Body or '' }}</textarea><br><br>

        <button type="submit">Save Changes</button>
    </form>

    <p><a href="/places/{{ review.PlaceID }}">Back to Place</a></p>
</body>
</html>
